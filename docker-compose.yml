services:
  postgres:
    image: postgres:18-alpine
    container_name: ulinkrpc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ulinkrpc}
      POSTGRES_USER: ${POSTGRES_USER:-ulinkrpc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ulinkrpc_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ulinkrpc} -d ${POSTGRES_DB:-ulinkrpc}"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: ulinkrpc-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-ulinkrpc_pgadmin_dev_password}
    ports:
      - "${PGADMIN_PORT:-8080}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: ulinkrpc-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-ulinkrpc_redis_dev_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-ulinkrpc_redis_dev_password} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  pgadmin-data:
  redis-data:
